<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Keyword Analyzer</title>
    <!-- Quill Rich Text Editor (CSS) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.6/quill.snow.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SEO Keyword Analyzer</h1>
            <p>Real-time keyword occurrence analysis</p>
        </header>
        
        <main class="main-content">
            <div class="editor-section">
                <div class="input-group editor-group">
                    <label>Content Editor</label>
                    <div class="editor-wrapper">
                        <div id="editor-container"></div>
                    </div>
                </div>
                
                <div class="keywords-container">
                    <div class="input-group">
                        <label for="main-keywords" class="main-label">
                            Main Keywords 
                            <span class="badge">Primary</span>
                        </label>
                        <textarea id="main-keywords" placeholder="Enter main keywords (one per line)&#10;keyword 1&#10;keyword 2"></textarea>
                    </div>
                    
                    <div class="input-group">
                        <label for="extra-keywords" class="extra-label">
                            Extra Keywords 
                            <span class="badge">Secondary</span>
                        </label>
                        <textarea id="extra-keywords" placeholder="Enter extra keywords (one per line)&#10;keyword 1&#10;keyword 2"></textarea>
                    </div>
                </div>
            </div>
            
            <div class="results-section">
                <div class="results-header">
                    <h2>Keyword Analysis</h2>
                    <div class="stats">
                        <span id="total-words">0 Words</span>
                    </div>
                </div>
                
                <div class="results-scroll-area">
                    <div class="results-group" id="main-results-group">
                        <h3 class="group-title">Main Keywords <span class="group-stats" id="main-stats">0</span></h3>
                        <div class="results-list" id="main-results-list">
                            <div class="empty-state">No main keywords entered</div>
                        </div>
                    </div>

                    <div class="results-group" id="extra-results-group">
                        <h3 class="group-title">Extra Keywords <span class="group-stats" id="extra-stats">0</span></h3>
                        <div class="results-list" id="extra-results-list">
                            <div class="empty-state">No extra keywords entered</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <section class="quality-section">
            <h2>Quality Checklist</h2>
            <div class="checklist-grid" id="quality-checklist">
                <!-- Javascript will populate this -->
            </div>
        </section>

        <section class="frequency-section">
            <h2>Top 50 Most Frequent Words</h2>
            <div class="freq-list" id="word-frequency-list">
                <!-- Javascript will populate this -->
            </div>
        </section>
    </div>
    
    <!-- Quill Rich Text Editor (JS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.6/quill.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
